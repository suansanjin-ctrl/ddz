<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>牌桌 - 云上斗地主</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="qq-table-page">
    <main class="table-app">
      <header class="table-topbar">
        <div class="table-title">
          <span class="table-brand">QQ 风格牌桌</span>
          <strong>房间 <span id="gameRoomCode">----</span></strong>
        </div>
        <div class="table-tools">
          <button id="soundToggleBtn" class="top-btn" type="button">音效开</button>
          <button id="copyLinkBtn" class="top-btn" type="button">复制直达牌桌链接</button>
          <a class="top-btn" href="./index.html">返回首页</a>
        </div>
      </header>

      <section class="qq-table">
        <div class="table-felt">
          <div class="table-corner-light left"></div>
          <div class="table-corner-light right"></div>
          <div id="dealTrails" class="deal-trails hidden" aria-hidden="true"></div>
          <div id="seatLeft" class="seat-badge seat-left"></div>
          <div id="seatRight" class="seat-badge seat-right"></div>

          <div class="desk-center">
            <div class="desk-stage">
              <span id="stageBadge" class="stage-badge">牌桌准备中</span>
              <strong id="stagePrompt" class="stage-prompt">房主把链接发出去，其他人点开就会直接进桌。</strong>
            </div>
            <div class="desk-hud">
              <div class="hud-chip">
                <span>局数</span>
                <strong id="roundBadge">第 0 局</strong>
              </div>
              <div class="hud-chip">
                <span>倍数</span>
                <strong id="baseScoreBadge">1 倍</strong>
              </div>
            </div>
            <div class="desk-pill" id="gameStatusText">正在连接牌桌...</div>
            <div id="deckDock" class="deck-dock">
              <div class="deck-stack" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <div id="dealBanner" class="deal-banner hidden">发牌中</div>
            </div>
            <div class="desk-landlord">
              <div class="desk-section-head">
                <span>底牌</span>
                <em id="kittyHint">叫到最高分后亮出底牌</em>
              </div>
              <div id="kittyZone" class="desk-card-row"></div>
            </div>
            <div class="desk-play-area">
              <div class="desk-section-title">桌面出牌</div>
              <div id="trickZone" class="desk-card-row large"></div>
            </div>
            <div class="desk-turn-wrap">
              <div class="desk-turn" id="turnBadge">等待开始</div>
              <div class="turn-timer hidden" id="turnTimer">15</div>
            </div>
            <div id="centerToast" class="center-toast hidden"></div>
            <div id="deskFeed" class="desk-feed"></div>
          </div>

          <div id="mySeat" class="seat-badge seat-bottom"></div>
          <div id="trickBurst" class="trick-burst hidden" aria-hidden="true"></div>
          <div id="impactFlash" class="impact-flash hidden"></div>
          <div id="stageAnnouncement" class="stage-announcement hidden"></div>

          <div id="resultPanel" class="result-panel hidden">
            <div id="resultCard" class="result-card">
              <p class="result-kicker">本局结算</p>
              <h2 id="resultTitle">等待本局结束</h2>
              <p id="resultMeta" class="result-meta"></p>
              <div id="resultScoreboard" class="result-scoreboard"></div>
              <div id="resultLogs" class="result-logs"></div>
              <div class="result-actions">
                <button id="resultRestartBtn" class="primary-cta hidden" type="button">再来一局</button>
                <a class="ghost-cta" href="./index.html">返回大厅</a>
              </div>
            </div>
          </div>

          <div id="tableOverlay" class="table-overlay">
            <div class="overlay-panel">
              <p class="overlay-kicker">在线牌桌</p>
              <h1 id="overlayTitle">正在进入牌桌</h1>
              <p id="overlayDesc" class="overlay-desc">等待房间信息...</p>

              <div class="overlay-share">
                <textarea id="shareLink" readonly></textarea>
                <button id="overlayCopyBtn" class="primary-cta" type="button">复制直达链接</button>
              </div>

              <form id="joinForm" class="overlay-join hidden">
                <input id="joinName" maxlength="12" placeholder="输入你的昵称" required />
                <button class="primary-cta" type="submit">进入牌桌</button>
              </form>

              <div id="waitingPlayers" class="waiting-players"></div>

              <div class="overlay-actions">
                <button id="startBtn" class="primary-cta hidden" type="button">开始游戏</button>
                <button id="overlayHomeBtn" class="ghost-cta" type="button">返回首页</button>
              </div>

              <p id="overlayMessage" class="overlay-message"></p>
            </div>
          </div>
        </div>
      </section>

      <section class="bottom-panel">
        <div class="action-strip">
          <div class="action-copy">
            <strong id="playerSummary">你的手牌</strong>
            <span id="actionHint">等待其他玩家进入...</span>
          </div>

          <div id="bidActions" class="action-buttons hidden">
            <button data-bid="0" class="ghost-btn" type="button">不叫</button>
            <button data-bid="1" class="call-btn" type="button">1 分</button>
            <button data-bid="2" class="call-btn" type="button">2 分</button>
            <button data-bid="3" class="call-btn" type="button">3 分</button>
          </div>

          <div id="playActions" class="action-buttons hidden">
            <button id="playBtn" class="primary-cta action-main" type="button">出牌</button>
            <button id="passBtn" class="warn-btn" type="button">不要</button>
            <button id="clearBtn" class="ghost-btn" type="button">重选</button>
            <button id="restartBtn" class="primary-cta" type="button">再来一局</button>
          </div>
        </div>

        <div id="myHand" class="qq-hand"></div>
      </section>
    </main>

    <script src="./shared.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
