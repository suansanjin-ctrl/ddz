<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>跳转中 - 云上斗地主</title>
    <meta http-equiv="refresh" content="0; url=./index.html" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="compat-page">
    <main class="compat-panel">
      <h1>正在跳转到新牌桌入口</h1>
      <p>这个旧房间页已经停用，现在会直接进入牌桌页面。</p>
      <p><a href="./index.html">如果没有自动跳转，点这里返回首页。</a></p>
    </main>
    <script>
      const room = new URLSearchParams(window.location.search).get("room");
      window.location.replace(room ? `./game.html?room=${encodeURIComponent(room)}` : "./index.html");
    </script>
  </body>
</html>
